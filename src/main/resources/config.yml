spawn-world: "world" # The world that the player will Teleport to once a Reset Happens
auto-reset: true
reset-interval: 30 # Reset interval in days
# Resets the resource world if players are online in the server
# true: Players in the resource world will be teleported to the spawn
# false: Wait when the server is empty
reset-with-players-online: false
teleport-radius: 200 # Random teleport radius (set 0 disable)
teleport-delay: 5 # Teleport delay in seconds

resource-world-settings:
  teleport-spawn-on-quit: true
  disable-set-respawn: true
  keep-inventory: false
  difficulty: NORMAL
  custom-seed: ""
  pvp: true
  always-day: false
  allow-nether-portals: true # If resource nether is disabled portals will bring to the default one
  allow-end-portals: true # If resource end is disabled portals will bring to the default one
  disable-dragon-battle: true

resource-dimensions:
  overworld:
    name: "world_resource"
    border: 5000
  nether:
    name: "world_resource_nether"
    enabled: true
    border: 625
  end:
    name: "world_resource_end"
    enabled: false
    border: 2500