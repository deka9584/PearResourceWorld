name: PearResourceWorld
version: "1.0"
author: deka9584
main: pear.resourceworld.PearResourceWorld
api-version: 1.15
commands:
  pearresourceworldadmin:
    description: Admin command
    aliases: [resourceworldadmin]
    permission: pearresourceworld.admin
  pearresourceworld:
    description: Teleport to resource world
    aliases: [resourceworld]
    permission: pearresourceworld.tp
permissions:
  pearresourceworld.admin:
    description: Allows admin command
    default: op
  pearresourceworld.admin.tp:
    description: Allows admin TP subcommand
    default: op
  pearresourceworld.admin.tpspawn:
    description: Allows admin TPSPAWN subcommand
    default: op
  pearresourceworld.admin.reset:
    description: Allows admin RESET subcommand
    default: op
  pearresourceworld.admin.kickall:
    description: Allows admin KICKALL subcommand
    default: op
  pearresourceworld.admin.time:
    description: Allows admin TIME subcommand
    default: op
  pearresourceworld.tp:
    description: Allows resource world tp command
    default: true
  pearresourceworld.tp.spawn:
    description: Allows resource world SPAWN subcommand
    default: true
  pearresourceworld.tp.delay.bypass:
    description: Allows to bypass teleport delay
    default: op
  pearresourceworld.tp.cooldown.bypass:
    description: Allows to bypass teleport cooldown
    default: op
  pearresourceworld.signs.create:
    description: Allows to create resource world signs
    default: op
  pearresourceworld.signs.use:
    description: Allows to use resource world signs
    default: true
  pearresourceworld.signs.break:
    description: Allows to break resource world signs
    default: op